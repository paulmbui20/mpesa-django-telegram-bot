services:
  docs:
    image: m_pesa_telegram_bot_local_docs
    container_name: m_pesa_telegram_bot_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./m_pesa_telegram_bot:/app/m_pesa_telegram_bot:z
    ports:
      - '9000:9000'
    command: /start-docs
